name: Daily Tech News Update

on:
  # Run at 9 AM and 9 PM Taiwan time (UTC+8)
  # 9 AM Taiwan = 1 AM UTC
  # 9 PM Taiwan = 1 PM UTC (13:00)
  schedule:
    - cron: '0 1 * * *'  # 9 AM Taiwan
    - cron: '0 13 * * *' # 9 PM Taiwan
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install tavily-python
      
      - name: Fetch and update news
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python scripts/update_news.py
      
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update news - ${{ github.run_number }}"
          file_pattern: "index.html articles/*.html"
