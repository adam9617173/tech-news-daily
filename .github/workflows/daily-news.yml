name: Daily News Auto-Publish

on:
  schedule:
    # 每天 UTC 1:00 (台灣 9:00) 執行
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  daily-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios

      - name: Fetch latest news from RSS
        run: |
          node << 'EOF'
          const axios = require('axios');
          
          async function getNews() {
            try {
              // 抓 TechCrunch RSS
              const response = await axios.get('https://techcrunch.com/feed/', {
                headers: {'User-Agent': 'Mozilla/5.0'}
              });
              
              // 解析 RSS
              const items = response.data.match(/<item[^>]*>([\s\S]*?)<\/item>/g);
              
              if (items && items.length > 0) {
                // 取前2篇
                console.log('Found news articles');
                console.log('LATEST_NEWS_AVAILABLE=true');
              }
            } catch(e) {
              console.log('Error:', e.message);
            }
          }
          getNews();
          EOF

      - name: Commit and push if new content
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -A
          git diff --quiet && echo "No changes" || (
            git commit -m "Auto-update: daily news" && 
            git push
          )
          
      - name: Send Telegram notification
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ 每日新聞已自動更新！"
