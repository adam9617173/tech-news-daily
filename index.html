        <script>
        (function() {
            const container = document.getElementById('floatingStickers');
            const stickers = ['sticker-1.png', 'sticker-2.png', 'sticker-3.png', 'sticker-4.png', 'sticker-5.png'];
            const sizes = [
                ...Array(4).fill(0).map(() => 80 + Math.random() * 20),
                ...Array(4).fill(0).map(() => 50 + Math.random() * 15),
                ...Array(8).fill(0).map(() => 30 + Math.random() * 15)
            ];
            sizes.forEach((size, i) => {
                const img = document.createElement('img');
                img.src = stickers[i % stickers.length];
                img.className = 'floating-sticker';
                img.style.width = size + 'px';
                img.style.height = size + 'px';
                img.style.opacity = size > 60 ? '0.15' : '0.1';
                container.appendChild(img);
                img._vx = (Math.random() - 0.5) * 1.2;
                img._vy = (Math.random() - 0.5) * 1.2;
                img._x = Math.random() * (window.innerWidth - 100);
                img._y = Math.random() * (window.innerHeight - 100);
            });
            function animate() {
                const elems = document.querySelectorAll('.floating-sticker');
                elems.forEach(img => {
                    img._x += img._vx;
                    img._y += img._vy;
                    if (img._x <= -50 || img._x >= window.innerWidth - 50) img._vx *= -1;
                    if (img._y <= -50 || img._y >= window.innerHeight - 50) img._vy *= -1;
                    img.style.transform = `translate(${img._x}px, ${img._y}px)`;
                });
                requestAnimationFrame(animate);
            }
            animate();
        })();
        </script>
