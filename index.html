        <!-- Floating decorative stickers - Physics based -->
        <div class="floating-stickers" id="floatingStickers"></div>
        
        <script>
        (function() {
            const container = document.getElementById('floatingStickers');
            const stickers = ['sticker-1.png', 'sticker-2.png', 'sticker-3.png', 'sticker-4.png', 'sticker-5.png', 'sticker-6.png', 'sticker-7.png', 'sticker-8.png', 'sticker-9.png', 'sticker-10.png'];
            
            function getContainerSize() {
                const rect = container.getBoundingClientRect();
                return { width: rect.width, height: rect.height };
            }
            
            // Create stickers with different sizes
            // 6 large + 6 medium + 12 small
            const sizes = [
                ...Array(6).fill(0).map(() => 85 + Math.random() * 20),  // Large: 85-105px
                ...Array(6).fill(0).map(() => 55 + Math.random() * 20),  // Medium: 55-75px
                ...Array(12).fill(0).map(() => 30 + Math.random() * 18)   // Small: 30-48px
            ];
            
            sizes.forEach((size, i) => {
                const img = document.createElement('img');
                img.src = stickers[i % stickers.length];
                img.className = 'floating-sticker';
                img.alt = '';
                img.style.width = size + 'px';
                img.style.height = size + 'px';
                
                // Larger stickers should be slightly more visible
                img.style.opacity = size > 70 ? '0.18' : (size > 50 ? '0.15' : '0.1');
                
                container.appendChild(img);
                
                // Physics properties - larger = slower
                const speedFactor = size > 70 ? 0.8 : (size > 50 ? 1 : 1.2);
                img._vx = (Math.random() - 0.5) * 1.5 * speedFactor;
                img._vy = (Math.random() - 0.5) * 1.5 * speedFactor;
                img._rotation = Math.random() * 360;
                img._rotationSpeed = (Math.random() - 0.5) * 2;
            });
            
            // Initialize positions
            setTimeout(() => {
                const { width, height } = getContainerSize();
                const stickerElems = container.querySelectorAll('.floating-sticker');
                stickerElems.forEach(img => {
                    img._x = Math.random() * (width - 50);
                    img._y = Math.random() * (height - 50);
                });
            }, 100);
            
            // Animation loop
            function animate() {
                const stickerElems = container.querySelectorAll('.floating-sticker');
                const { width, height } = getContainerSize();
                
                if (width > 0 && height > 0) {
                    stickerElems.forEach(img => {
                        img._x += img._vx;
                        img._y += img._vy;
                        img._rotation += img._rotationSpeed;
                        
                        const size = parseFloat(img.style.width) || 50;
                        
                        // Bounce off edges
                        if (img._x <= -size/2) {
                            img._x = -size/2;
                            img._vx = Math.abs(img._vx) * (0.8 + Math.random() * 0.4);
                        }
                        if (img._x >= width - size/2) {
                            img._x = width - size/2;
                            img._vx = -Math.abs(img._vx) * (0.8 + Math.random() * 0.4);
                        }
                        if (img._y <= -size/2) {
                            img._y = -size/2;
                            img._vy = Math.abs(img._vy) * (0.8 + Math.random() * 0.4);
                        }
                        if (img._y >= height - size/2) {
                            img._y = height - size/2;
                            img._vy = -Math.abs(img._vy) * (0.8 + Math.random() * 0.4);
                        }
                        
                        // Random velocity change
                        if (Math.random() < 0.003) {
                            img._vx += (Math.random() - 0.5) * 0.3;
                            img._vy += (Math.random() - 0.5) * 0.3;
                            img._vx = Math.max(-2, Math.min(2, img._vx));
                            img._vy = Math.max(-2, Math.min(2, img._vy));
                        }
                        
                        img.style.transform = `translate(${img._x}px, ${img._y}px) rotate(${img._rotation}deg)`;
                    });
                }
                
                requestAnimationFrame(animate);
            }
            
            animate();
            
            window.addEventListener('resize', () => {
                const { width, height } = getContainerSize();
                const stickerElems = container.querySelectorAll('.floating-sticker');
                stickerElems.forEach(img => {
                    if (img._x > width) img._x = width - 50;
                    if (img._y > height) img._y = height - 50;
                });
            });
        })();
        </script>

        const ARTICLES_PER_PAGE = 9;
        let currentPage = 1;
        
        function renderArticles(page) {
            const grid = document.getElementById('newsGrid');
            const start = (page - 1) * ARTICLES_PER_PAGE;
            const end = start + ARTICLES_PER_PAGE;
            const pageArticles = articlesData.slice(start, end);
            
            if (pageArticles.length === 0) {
                grid.innerHTML = '<p style="text-align:center;padding:2rem;color:#888;">尚無文章</p>';
                return;
            }
            
            grid.innerHTML = pageArticles.map(article => `
                <a href="${article.file}" class="article-card">
                    <div class="card-image">
                        <img src="${article.sticker}" alt="${article.source}">
                    </div>
                    <div class="card-content">
                        <span class="card-date">📅 ${article.date}</span>
                        <h3>${article.title}</h3>
                        <p class="card-summary">${article.summary}</p>
                        <div class="card-footer">
                            <span class="source">📰 ${article.source}</span>
                            <span class="read-more">閱讀 →</span>
                        </div>
                    </div>
                </a>
            `).join('');
            
            renderPagination(page);
        }
        
        function renderPagination(page) {
            const totalPages = Math.ceil(articlesData.length / ARTICLES_PER_PAGE);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // Previous button
            html += `<a href="#" class="pagination-btn" onclick="goToPage(${page - 1});return false;" ${page === 1 ? 'disabled' : ''}>上一頁</a>`;
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= page - 1 && i <= page + 1)) {
                    html += `<a href="#" class="pagination-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i});return false;">${i}</a>`;
                } else if (i === page - 2 || i === page + 2) {
                    html += `<span class="page-info">...</span>`;
                }
            }
            
            // Next button
            html += `<a href="#" class="pagination-btn" onclick="goToPage(${page + 1});return false;" ${page === totalPages ? 'disabled' : ''}>下一頁</a>`;
            
            // Page info
            html += `<span class="page-info">第 ${page} / ${totalPages} 頁，共 ${articlesData.length} 篇</span>`;
            
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            const totalPages = Math.ceil(articlesData.length / ARTICLES_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderArticles(page);
            window.scrollTo({ top: 500, behavior: 'smooth' });
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderArticles(1);
        });
        </script>
