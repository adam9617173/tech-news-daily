<svg xmlns="http://www.w3.org/2000/svg" viewBox="400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="lobster" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Neural network lines -->
  <g stroke="rgba(102,126,234,0.3)" stroke-width="1" fill="none">
    <circle cx="50" cy="50" r="3"/><circle cx="100" cy="80" r="2"/><circle cx="80" cy="120" r="2"/><circle cx="350" cy="60" r="3"/><circle cx="320" cy="100" r="2"/><circle cx="300" cy="150" r="2"/>
    <line x1="50" y1="50" x2="100" y2="80"/><line x1="50" y1="50" x2="80" y2="120"/><line x1="100" y1="80" x2="80" y2="120"/><line x1="350" y1="60" x2="320" y2="100"/><line x1="350" y1="60" x2="300" y2="150"/><line x1="320" y1="100" x2="300" y2="150"/>
  </g>
  
  <!-- AI Chip -->
  <g transform="translate(280, 200)">
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#667eea" opacity="0.8"/>
    <rect x="10" y="10" width="40" height="40" rx="4" fill="#764ba2"/>
    <text x="30" y="35" text-anchor="middle" fill="white" font-size="14" font-weight="bold">AI</text>
  </g>
  
  <!-- Lobster body (Cbob in costume) -->
  <g transform="translate(140, 80)">
    <!-- Lobster body/head -->
    <ellipse cx="60" cy="70" rx="55" ry="50" fill="url(#lobster)"/>
    <!-- Eyes -->
    <circle cx="45" cy="50" r="12" fill="white"/>
    <circle cx="75" cy="50" r="12" fill="white"/>
    <circle cx="45" cy="50" r="6" fill="#1a1a2e"/>
    <circle cx="75" cy="50" r="6" fill="#1a1a2e"/>
    <!-- Smile -->
    <path d="M 45 80 Q 60 95 75 80" stroke="#1a1a2e" stroke-width="3" fill="none"/>
    <!-- Lobster antenna -->
    <path d="M 30 30 Q 10 -10 20 -30" stroke="#ff6b6b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 90 30 Q 110 -10 100 -30" stroke="#ff6b6b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Lobster claws -->
    <ellipse cx="10" cy="90" rx="20" ry="15" fill="#ee5a24"/>
    <ellipse cx="110" cy="90" rx="20" ry="15" fill="#ee5a24"/>
    <!-- Lobster legs -->
    <line x1="30" y1="110" x2="20" y2="140" stroke="#ee5a24" stroke-width="4" stroke-linecap="round"/>
    <line x1="50" y1="115" x2="45" y2="145" stroke="#ee5a24" stroke-width="4" stroke-linecap="round"/>
    <line x1="70" y1="115" x2="75" y2="145" stroke="#ee5a24" stroke-width="4" stroke-linecap="round"/>
    <line x1="90" y1="110" x2="100" y2="140" stroke="#ee5a24" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Title text -->
  <text x="200" y="260" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🤖 2026年3月 AI 模型發布彙整</text>
  
  <!-- Decorative stars -->
  <text x="30" y="40" fill="#ffd700" font-size="12">★</text>
  <text x="370" y="30" fill="#ffd700" font-size="10">★</text>
  <text x="30" y="270" fill="#ffd700" font-size="10">★</text>
</svg>
